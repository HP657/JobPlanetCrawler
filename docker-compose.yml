services:
  # 1. PostgreSQL 데이터베이스 서비스
  postgres-db:
    image: postgres:17-alpine
    container_name: local-postgres-db
    environment:
      POSTGRES_DB: jobplanet_crawler_db
      POSTGRES_USER: jobplanet_crawler_user
      POSTGRES_PASSWORD: jobplanet_crawler_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # 2. 스프링 부트 애플리케이션 서비스 (필요시 활성화)
  # app-api:
  #   build: .
  #   container_name: jobplanet-api-server
  #   ports:
  #     - "8080:8080"
