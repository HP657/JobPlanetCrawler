  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/jobplanet_db
  #     SPRING_DATASOURCE_USERNAME: jobplanet_user
  #     SPRING_DATASOURCE_PASSWORD: jobplanet_password
  #   depends_on:
  #     - postgres-db
  #   restart: always

volumes:
  postgres_data:
