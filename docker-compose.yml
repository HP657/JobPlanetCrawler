services:
  postgres-db:
    image: postgres:17-alpine
    container_name: local-postgres-db
    environment:
      POSTGRES_DB: jobplanet_crawler_db
      POSTGRES_USER: jobplanet_crawler_user
      POSTGRES_PASSWORD: jobplanet_crawler_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    image: ghcr.io/hp657/jobplanetcrawler/crawler:latest
    container_name: jobplanet-api-server
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/jobplanet_crawler_db
      SPRING_DATASOURCE_USERNAME: jobplanet_crawler_user
      SPRING_DATASOURCE_PASSWORD: jobplanet_crawler_password
    volumes:
      - ./backups:/app/backups
      - ./logs:/app/logs
    depends_on:
      - postgres-db
    restart: always
    deploy:
      resources:
        limits:
          memory: 1024m

volumes:
  postgres_data: