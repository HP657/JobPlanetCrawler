name: Java CI/CD with Gradle and Tailscale Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew bootJar

      - name: Install Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PI_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to Raspberry Pi
        run: |
          JAR_FILE=$(find build/libs -name "*.jar")
          scp $JAR_FILE ${{ secrets.PI_USER }}@${{ secrets.PI_HOST }}:${{ secrets.PI_DEPLOY_PATH }}/app.jar
          ssh ${{ secrets.PI_USER }}@${{ secrets.PI_HOST }} "killall java || true && nohup java -jar ${{ secrets.PI_DEPLOY_PATH }}/app.jar > ${{ secrets.PI_DEPLOY_PATH }}/app.log 2>&1 &"
