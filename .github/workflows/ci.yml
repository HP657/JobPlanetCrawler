name: Java CI/CD with Gradle and Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/hp657/jobplanetcrawler/crawler:latest
          cache-from: type=registry,ref=ghcr.io/hp657/jobplanetcrawler/crawler:buildcache
          cache-to: type=registry,ref=ghcr.io/hp657/jobplanetcrawler/crawler:buildcache,mode=max

      - name: Install Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: ssh-keyscan -H "${{ secrets.PI_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to Raspberry Pi
        run: |
          # 1. SCP로 파일 전송 (애플보이 액션 대신 표준 명령어 사용)
          scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.PI_USER }}@${{ secrets.PI_HOST }}:${{ secrets.PI_DEPLOY_PATH }}/
          
          # 2. SSH로 접속하여 도커 실행
          ssh -o StrictHostKeyChecking=no ${{ secrets.PI_USER }}@${{ secrets.PI_HOST }} "
            cd ${{ secrets.PI_DEPLOY_PATH }} &&
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.CR_PAT }} &&
            docker compose pull &&
            docker compose up -d --force-recreate
          "