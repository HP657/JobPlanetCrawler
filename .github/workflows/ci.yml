name: Java CI/CD with Gradle and Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 실행 권한 부여 (필수!)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. GHCR 로그인 (이미지 배포를 위해 필수)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner | lower }}/${{ github.event.repository.name }}/crawler:latest

      # 4. Tailscale 연결
      - name: Install Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      # 5. SSH 설정
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PI_HOST }}" >> ~/.ssh/.known_hosts

      # 6. 서버에서 컨테이너 재시작
      - name: Deploy to Raspberry Pi
        run: |
          ssh ${{ secrets.PI_USER }}@${{ secrets.PI_HOST }} "
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} &&
            docker pull ghcr.io/${{ github.repository_owner | lower }}/${{ github.event.repository.name }}/crawler:latest &&
            docker-compose -f ${{ secrets.PI_DEPLOY_PATH }}/docker-compose.yml up -d --force-recreate
          "